name: keystone
description: Job management for professional locksmiths in Ghana
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_web_plugins:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1

  # Backend
  supabase_flutter: ^2.5.0

  # Local storage (offline-first)
  hive_flutter: ^1.1.0

  # Navigation
  go_router: ^13.2.0

  # OTP input
  pinput: ^3.0.1

  # Image handling
  image_picker: ^1.1.2
  flutter_image_compress: ^2.3.0
  geolocator: ^12.0.0
  package_info_plus: ^8.0.0

  # Local auth (biometric + PIN)
  local_auth: ^2.3.0
  flutter_secure_storage: ^9.2.2

  # Encryption
  encrypt: ^5.0.3
  crypto: ^3.0.3

  # Utilities
  url_launcher: ^6.2.6
  share_plus: ^9.0.0
  connectivity_plus: ^6.0.3
  intl: ^0.19.0
  uuid: ^4.4.0
  path_provider: ^2.1.0
  collection: ^1.18.0
  flutter_svg: ^2.2.4
  line_awesome_flutter: ^3.0.1
  flutter_animate: ^4.5.2
  flutter_native_splash: ^2.4.1
  pdf: ^3.12.0
  printing: ^5.13.1
  flutter_contacts: ^1.1.9
  record: ^6.0.0
  video_player: ^2.11.1
  flutter_local_notifications: ^18.0.1
  workmanager: ^0.9.0
  file_picker: ^8.0.0
  just_audio: ^0.9.40
  open_filex: ^4.5.0

  # Notifications / snackbars
  another_flushbar: ^2.2.4

  # Charts
  fl_chart: ^1.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_driver:
    sdk: flutter
  integration_test:
    sdk: flutter
  build_runner: ^2.4.9
  flutter_lints: ^4.0.0
  mocktail: ^1.0.3
  plugin_platform_interface: ^2.1.8
  url_launcher_platform_interface: ^2.3.2

flutter:
  uses-material-design: true

  assets:
    - assets/
    - assets/logo/
    - assets/fonts/
    - assets/flags/
    - assets/services/
    - assets/icons/3d/
    - assets/icons/3d/transparent/
  fonts:
    - family: BarlowSemiCondensed
      fonts:
        - asset: assets/fonts/BarlowSemiCondensed-Medium.ttf
          weight: 500
        - asset: assets/fonts/BarlowSemiCondensed-MediumItalic.ttf
          weight: 500
          style: italic
        - asset: assets/fonts/BarlowSemiCondensed-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/BarlowSemiCondensed-SemiBoldItalic.ttf
          weight: 600
          style: italic
        - asset: assets/fonts/BarlowSemiCondensed-Bold.ttf
          weight: 700
        - asset: assets/fonts/BarlowSemiCondensed-BoldItalic.ttf
          weight: 700
          style: italic
        - asset: assets/fonts/BarlowSemiCondensed-ExtraBold.ttf
          weight: 800
        - asset: assets/fonts/BarlowSemiCondensed-ExtraBoldItalic.ttf
          weight: 800
          style: italic
        - asset: assets/fonts/BarlowSemiCondensed-Black.ttf
          weight: 900
        - asset: assets/fonts/BarlowSemiCondensed-BlackItalic.ttf
          weight: 900
          style: italic

