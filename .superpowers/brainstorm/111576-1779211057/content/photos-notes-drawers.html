<h2>Photos & Notes — Drawers</h2>
<p class="subtitle">Simple, focused drawers for the last two sections</p>

<div style="display:flex;gap:16px;flex-wrap:wrap">
  <!-- Photos Drawer -->
  <div style="flex:1;min-width:280px;background:#1a1a2e;border-radius:12px 12px 0 0;padding:20px;margin:12px 0">
    <div style="width:40px;height:4px;background:#444;border-radius:2px;margin:0 auto 12px"></div>
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px">
      <div>
        <div style="color:#e94560;font-weight:bold;font-size:11px;letter-spacing:1px">PHOTOS</div>
        <div style="color:#888;font-size:11px">4 photos</div>
      </div>
      <span style="color:#888;font-size:20px;cursor:pointer">✕</span>
    </div>

    <!-- Before section -->
    <div style="margin-bottom:20px">
      <div style="color:#888;font-size:9px;letter-spacing:1px;font-weight:bold;margin-bottom:10px">BEFORE</div>
      <div style="display:flex;gap:8px;flex-wrap:wrap">
        <div style="width:64px;height:64px;background:#0f3460;border-radius:6px;border:1px solid #333"></div>
        <div style="width:64px;height:64px;background:#0f3460;border-radius:6px;border:1px solid #333"></div>
        <div style="width:64px;height:64px;background:#0f3460;border-radius:6px;border:1px dashed #e94560;display:flex;align-items:center;justify-content:center;cursor:pointer">
          <span style="color:#e94560;font-size:20px">+</span>
        </div>
      </div>
    </div>

    <!-- After section -->
    <div style="margin-bottom:20px">
      <div style="color:#888;font-size:9px;letter-spacing:1px;font-weight:bold;margin-bottom:10px">AFTER</div>
      <div style="display:flex;gap:8px;flex-wrap:wrap">
        <div style="width:64px;height:64px;background:#0f3460;border-radius:6px;border:1px solid #333"></div>
        <div style="width:64px;height:64px;background:#0f3460;border-radius:6px;border:1px dashed #e94560;display:flex;align-items:center;justify-content:center;cursor:pointer">
          <span style="color:#e94560;font-size:20px">+</span>
        </div>
      </div>
    </div>

    <button style="background:#e94560;color:#fff;border:none;border-radius:6px;padding:16px;width:100%;font-weight:bold;font-size:13px;letter-spacing:1px;cursor:pointer">DONE</button>
  </div>

  <!-- Notes Drawer -->
  <div style="flex:1;min-width:280px;background:#1a1a2e;border-radius:12px 12px 0 0;padding:20px;margin:12px 0">
    <div style="width:40px;height:4px;background:#444;border-radius:2px;margin:0 auto 12px"></div>
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px">
      <div>
        <div style="color:#e94560;font-weight:bold;font-size:11px;letter-spacing:1px">NOTES</div>
        <div style="color:#888;font-size:11px">Job notes and comments</div>
      </div>
      <span style="color:#888;font-size:20px;cursor:pointer">✕</span>
    </div>

    <!-- Note text area -->
    <div style="background:#0f3460;border-radius:6px;padding:14px;margin-bottom:20px;border:1px solid #333">
      <div style="color:#888;font-size:9px;letter-spacing:1px;margin-bottom:8px">NOTES</div>
      <textarea style="background:transparent;border:none;color:#fff;font-size:13px;width:100%;min-height:120px;resize:vertical;outline:none;font-family:inherit">Specific hardware used: Yale 210 deadbolt (brass, satin nickel). Customer wants follow-up in 3 months for maintenance check.</textarea>
      <div style="color:#888;font-size:10px;text-align:right">42 / 2000</div>
    </div>

    <button style="background:#e94560;color:#fff;border:none;border-radius:6px;padding:16px;width:100%;font-weight:bold;font-size:13px;letter-spacing:1px;cursor:pointer">DONE</button>
  </div>
</div>
