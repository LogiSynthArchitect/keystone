<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Professional locksmith profiles powered by Keystone Terminal.">
  <meta name="theme-color" content="#F4F7FF">

  <!-- Open Graph (for WhatsApp/social link previews) -->
  <meta property="og:type" content="profile">
  <meta property="og:title" content="Keystone — Professional Locksmith Profile">
  <meta property="og:description" content="View this locksmith's services and contact them on WhatsApp.">
  <meta property="og:site_name" content="Keystone Terminal">

  <!-- iOS -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Keystone">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>
  <title>Keystone Terminal</title>
  <link rel="manifest" href="manifest.json">

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background-color: #F4F7FF;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    #loading-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      opacity: 1;
      transition: opacity 0.3s ease;
    }
    #loading-screen.fade-out { opacity: 0; }
    .lock-icon {
      width: 56px;
      height: 56px;
      border: 2px solid #D4A853;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .lock-icon svg { fill: #D4A853; }
    .brand-name {
      color: #FFFFFF;
      font-size: 22px;
      font-weight: 900;
      letter-spacing: 6px;
    }
    .brand-sub {
      color: #D4A853;
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 5px;
      margin-top: -14px;
    }
    .spinner {
      width: 24px;
      height: 24px;
      border: 2px solid #1E2640;
      border-top: 2px solid #D4A853;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-top: 8px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="loading-screen">
    <div class="lock-icon">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="28" height="28">
        <path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z"/>
      </svg>
    </div>
    <div class="brand-name">KEYSTONE</div>
    <div class="brand-sub">TERMINAL</div>
    <div class="spinner"></div>
  </div>

  <script src="flutter_bootstrap.js" async></script>
  <script>
    // Hide loading screen once Flutter is ready
    window.addEventListener('flutter-first-frame', function() {
      var el = document.getElementById('loading-screen');
      if (el) {
        el.classList.add('fade-out');
        setTimeout(function() { el.style.display = 'none'; }, 300);
      }
    });
  </script>
</body>
</html>
