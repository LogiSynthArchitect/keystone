  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background-color: #F4F7FF;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    #loading-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      opacity: 1;
      transition: opacity 0.3s ease;
    }
    #loading-screen.fade-out { opacity: 0; }
    .lock-icon {
      width: 56px;
      height: 56px;
      border: 2px solid #D4A853;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .lock-icon svg { fill: #D4A853; }
    .brand-name {
      color: #0A1628;
      font-size: 22px;
      font-weight: 900;
      letter-spacing: 6px;
    }
    .brand-sub {
      color: #D4A017;
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 5px;
      margin-top: -14px;
    }
    .spinner {
      width: 24px;
      height: 24px;
      border: 2px solid #1E2640;
      border-top: 2px solid #D4A853;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-top: 8px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
